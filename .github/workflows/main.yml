name: Auto-scan Pacdora Influencers

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8 点自动运行
  workflow_dispatch: # 允许你手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4  # 这里已修正
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas google-api-python-client

      - name: Run Pacdora scan
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Auto-update Pacdora report: $(date +'%Y-%m-%d') [skip ci]" || exit 0
          git push
