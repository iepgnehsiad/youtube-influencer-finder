name: Auto-scan Pacdora Influencers

on:
  schedule:
    - cron: '0 8 * * *' # 每天北京时间下午 4 点自动运行 (UTC 8:00)
  workflow_dispatch: # 允许你手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 关键：赋予脚本写回仓库生成 Excel 的权限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 👈 升级到了 v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5 # 👈 升级到了 v5
        with:
          python-version: '3.11'
          
      - name: Create output directory
        run: mkdir -p output
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip # 核心修复：改为从 requirements.txt 安装所有插件
          pip install -r requirements.txt
          
      - name: Run Pacdora scan
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set -e
          echo "🚀 Starting Pacdora scan..."
          python main.py
          echo "✅ Pacdora scan completed successfully"
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ my_pool.txt || true # 防止没有新数据时提交报错
          git commit -m "Auto-update Pacdora report: $(date +'%Y-%m-%d')" || exit 0
          git push
